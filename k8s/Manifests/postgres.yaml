apiVersion: v1
kind: Secret
metadata:
  name: healthcare-postgres-secret
  namespace: healthcare
type: Opaque
stringData:
  db: booking
  user: booking
  password: booking
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-postgres
  namespace: healthcare
spec:
  selector:
    app.kubernetes.io/name: healthcare-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: healthcare-postgres
  namespace: healthcare
spec:
  serviceName: healthcare-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: healthcare-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: healthcare-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: healthcare-postgres-secret
                  key: db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: healthcare-postgres-secret
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-postgres-secret
                  key: password
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

