apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-backend
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: healthcare-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: healthcare-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z healthcare-postgres 5432; do
                echo "Waiting for Postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: healthcare-backend:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: "postgresql"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://healthcare-postgres:5432/booking"
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-postgres-secret
                  key: user
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-postgres-secret
                  key: password
            - name: QUARKUS_FLYWAY_LOCATIONS
              value: "classpath:db/migration-postgres"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

