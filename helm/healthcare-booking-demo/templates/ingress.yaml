{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-healthcare-booking
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "healthcare-booking-demo.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "healthcare-booking-demo.frontendServiceName" . }}
                port:
                  number: 80
{{- end }}

