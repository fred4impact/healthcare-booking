apiVersion: v1
kind: Service
metadata:
  name: {{ include "healthcare-booking-demo.frontendServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: healthcare-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: healthcare-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: 80

