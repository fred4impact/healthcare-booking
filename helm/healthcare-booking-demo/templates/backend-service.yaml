apiVersion: v1
kind: Service
metadata:
  name: {{ include "healthcare-booking-demo.backendServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: healthcare-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: healthcare-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.backend.servicePort }}
      targetPort: {{ .Values.backend.servicePort }}

