# Default: MySQL. For local dev without MySQL use profile 'dev': -Dquarkus.profile=dev
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=booking
quarkus.datasource.password=booking
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/booking

# REST base path (keeps all resources under /api/v1)
quarkus.rest.path=/api/v1

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true

# CORS for frontend (e.g. Vite dev server on 5173)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin
quarkus.http.cors.exposed-headers=Content-Disposition

# JWT (booking-platform)
mp.jwt.verify.publickey.location=classpath:publicKey.pem
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.new-token.issuer=https://healthbooking.example.com
smallrye.jwt.new-token.lifespan=3600
# Public paths first (permit): auth, register, hello, browse doctors & slots without login
quarkus.http.auth.permission.public.paths=/api/v1/auth,/api/v1/patients,/api/v1/hello,/api/v1/doctors,/api/v1/slots
quarkus.http.auth.permission.public.policy=permit
# Only booking (POST) requires JWT; GET doctors & GET slots are public above
quarkus.http.auth.permission.authenticated.paths=/api/v1/appointments
quarkus.http.auth.permission.authenticated.policy=authenticated

%dev.quarkus.datasource.dev-ui.allow-sql=true

quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server=true


management:
endpoints:
web:
exposure:
include: health,info,prometheus
endpoint:
prometheus:
enabled: true
