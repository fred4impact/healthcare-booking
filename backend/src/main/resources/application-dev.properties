# Dev profile: run without MySQL using in-memory H2
# Use with: mvn quarkus:dev -Dquarkus.profile=dev
# Or set QUARKUS_PROFILE=dev

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:booking;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Skip Flyway when using H2; let Hibernate create schema from entities
quarkus.flyway.migrate-at-start=false
quarkus.hibernate-orm.database.generation=drop-and-create


quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server=true

management:
endpoints:
web:
exposure:
include: health,info,prometheus
endpoint:
prometheus:
enabled: true
