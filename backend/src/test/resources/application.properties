# Test profile: run without external MySQL/Flyway
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:healthbooking_test;DB_CLOSE_DELAY=-1;MODE=MySQL

# Keep tests deterministic and self-contained
quarkus.flyway.migrate-at-start=false
quarkus.hibernate-orm.database.generation=drop-and-create

# Preserve API base path used by the app
quarkus.rest.path=/api/v1

